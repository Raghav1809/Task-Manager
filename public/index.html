<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Task Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Task Manager</h1>
      <p>Register, log in, and manage your tasks with ease.</p>
    </header>

    <main>
      <section id="auth-section" class="card auth-card">
        <div class="auth-tabs">
          <button id="login-tab" class="active">Login</button>
          <button id="register-tab">Register</button>
        </div>

        <form id="auth-form" class="form-card">
          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>
          <div class="form-field">
            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" />
          </div>
          <button type="submit" class="btn-primary">Continue</button>
          <p id="auth-status" class="status-message"></p>
        </form>
      </section>

      <section id="app-section" class="hidden">
        <div class="top-bar">
          <h2>Your Tasks</h2>
          <button id="logout-btn" class="btn-secondary">Logout</button>
        </div>

        <div class="task-area">
          <div class="task-form card">
            <h3>Add or Update Task</h3>
            <form id="task-form">
              <input type="hidden" id="task-id" />
              <div class="form-field">
                <label for="task-title">Title</label>
                <input type="text" id="task-title" required />
              </div>
              <div class="form-field">
                <label for="task-desc">Description</label>
                <textarea id="task-desc" rows="3"></textarea>
              </div>
              <div class="form-grid">
                <div class="form-field">
                  <label for="task-due">Due Date</label>
                  <input type="date" id="task-due" />
                </div>
                <div class="form-field">
                  <label for="task-status">Status</label>
                  <select id="task-status">
                    <option value="pending">Pending</option>
                    <option value="in progress">In Progress</option>
                    <option value="completed">Completed</option>
                  </select>
                </div>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn-primary" id="task-submit">Save Task</button>
                <button type="button" class="btn-secondary" id="task-clear">Clear</button>
              </div>
              <p id="task-message" class="status-message"></p>
            </form>
          </div>

          <div class="task-list card">
            <h3>Task List</h3>
            <div id="tasks"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
